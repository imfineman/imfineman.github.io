<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>주문 조회 | 대윤 농장</title><link rel="stylesheet" href="../assets/style.css"></head><body><header class="top"><a class="brand" href="../">대윤 농장</a><button class="mobile-menu" onclick="toggleMenu()">☰</button><nav class="nav"><a href="../">복숭아 구매</a><a href="./">주문 조회</a></nav></header><main class="section"><div class="panel" style="max-width:620px;margin:auto"><div class="eyebrow">고객 주문 조회</div><h1>내 주문 확인하기</h1><p class="muted">개인정보 보호를 위해 주문번호·주문자 이름·연락처가 모두 일치해야 조회됩니다.</p><form class="form" id="lookup"><label>주문번호<input name="orderNumber" required placeholder="예: DY2607221234"></label><label>주문자 이름<input name="ordererName" required></label><label>주문자 연락처<input name="ordererPhone" required inputmode="tel" placeholder="010-0000-0000"></label><div id="message" hidden></div><button class="btn">주문 조회</button></form><div id="result" hidden></div></div></main><script src="../config.js"></script><script src="../assets/common.js"></script><script>const f=document.querySelector('#lookup'),m=document.querySelector('#message'),r=document.querySelector('#result');f.ordererPhone.oninput=e=>e.target.value=phone(e.target.value);const q=new URLSearchParams(location.search).get('order');if(q)f.orderNumber.value=q;f.onsubmit=async e=>{e.preventDefault();m.hidden=true;r.hidden=true;try{const d=await api('/api/orders/lookup',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(f))) }),o=d.order;r.className='result';r.innerHTML=`<h2>${o.order_number}</h2><p><span class="status">${o.status}</span> · ${new Date(o.created_at).toLocaleString('ko-KR')}</p>${o.items.map(i=>`<div class="summary-line"><span>${i.name} ${i.fruit_count} × ${i.quantity}</span><b>${won(i.unit_price*i.quantity)}</b></div>`).join('')}<hr><div class="summary-line"><b>총 결제금액</b><strong>${won(o.total)}</strong></div><p>받는 분: ${o.receiver_name}<br>배송지: (${o.postcode}) ${o.base_address} ${o.detail_address}</p><div class="notice">농협은행 507068-52-044941 · 예금주 김창섭</div>`;r.hidden=false}catch(err){m.className='error';m.textContent=err.message;m.hidden=false}};</script></body></html>
