<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>판매자 관리 | 대윤 농장</title><link rel="stylesheet" href="../assets/style.css"></head><body><header class="top"><a class="brand" href="../">대윤 농장 관리자</a><nav class="nav"><a href="../">판매 홈페이지</a></nav></header><main class="section"><section class="panel login" id="login"><h1>관리자 로그인</h1><form class="form" id="loginForm"><label>관리 비밀번호<input type="password" name="password" required></label><div id="loginError" class="error" hidden></div><button class="btn">로그인</button></form></section><section id="dashboard" hidden><h1>주문 관리</h1><div class="actions"><button class="btn" onclick="loadOrders()">새로고침</button><button class="btn secondary" onclick="downloadCsv()">주문 리스트 CSV 다운로드</button><button class="btn danger" id="deleteBtn" onclick="deleteSelected()" disabled>선택 주문 삭제</button><button class="btn secondary" onclick="logout()">로그아웃</button></div><div class="panel"><h2>판매 가격 수정</h2><div id="priceEditor"></div><button class="btn" onclick="savePrices()">가격 저장</button></div><div class="panel" style="margin-top:18px"><h2>날짜별 주문량</h2><canvas id="chart" width="900" height="240" style="width:100%;height:240px"></canvas></div><div class="table-wrap" style="margin-top:18px"><table><thead><tr><th><input type="checkbox" onchange="toggleAll(this.checked)"></th><th>주문번호</th><th>일시</th><th>주문자</th><th>연락처</th><th>상품</th><th>금액</th><th>상태</th><th>배송지</th></tr></thead><tbody id="orders"></tbody></table></div></section></main><script src="../config.js"></script><script src="../assets/common.js"></script><script src="../assets/admin.js"></script></body></html>
